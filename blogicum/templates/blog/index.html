{% extends "base.html" %}

{% block title %}Главная страница{% endblock %}

{% block content %}
  <h1>Лента записей</h1>
  {% for post in posts %}
    <article>
      <h2>{{ post.title }}</h2>
      <p>{{ post.text|truncatewords:50 }}</p>
      <a href="{% url 'blog:post_detail' post.id %}">Читать далее</a>
    </article>
  {% empty %}
    <p>Нет опубликованных постов.</p>
  {% endfor %}
{% endblock %}
